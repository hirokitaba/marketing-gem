<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第14回マーケティング研究会｜AIワークシート</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
.page-header { background: #0F6E56; color: #E1F5EE; padding: 1rem 1.5rem; }
.page-header-inner { max-width: 740px; margin: 0 auto; }
.page-logo { font-size: 11px; opacity: 0.8; }
.page-title { font-size: 17px; font-weight: 600; margin-top: 3px; }
.page-sub { font-size: 12px; opacity: 0.75; margin-top: 2px; }
.container { max-width: 740px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
.info-banner { background: #fff8e6; border: 1px solid #f0c040; border-radius: 10px; padding: 10px 14px; font-size: 12px; color: #7a5500; margin-bottom: 1.25rem; line-height: 1.7; }
.info-banner strong { color: #5a3d00; }
.panel { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
.panel-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.panel-title { font-size: 14px; font-weight: 600; }
.panel-tag { font-size: 11px; background: #E1F5EE; color: #0F6E56; padding: 2px 8px; border-radius: 4px; margin-left: 8px; }
.toggle-arrow { font-size: 12px; color: #888; }
.fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.fields-full { grid-column: 1 / -1; }
.field-label { font-size: 11px; color: #666; margin-bottom: 4px; }
input, textarea { width: 100%; font-size: 13px; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; color: #1a1a1a; font-family: inherit; resize: vertical; outline: none; }
input:focus, textarea:focus { border-color: #1D9E75; background: #fff; }
textarea { min-height: 70px; line-height: 1.6; }
.step-nav { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.step-btn { font-size: 12px; padding: 6px 14px; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; background: #fff; color: #666; font-family: inherit; transition: all 0.15s; }
.step-btn:hover { border-color: #1D9E75; color: #0F6E56; }
.step-btn.active { background: #0F6E56; color: #fff; border-color: #0F6E56; }
.step-btn.done { border-color: #5DCAA5; color: #0F6E56; background: #f0fdf8; }
.step-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden; }
.step-head { padding: 1rem 1.25rem; border-bottom: 1px solid #eee; background: #fafafa; display: flex; gap: 10px; align-items: flex-start; }
.step-num { width: 26px; height: 26px; border-radius: 50%; background: #1D9E75; color: #fff; font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.step-name { font-size: 14px; font-weight: 600; }
.step-desc { font-size: 12px; color: #888; margin-top: 2px; }
.step-body { padding: 1rem 1.25rem; }
.how-to { background: #f0fdf8; border-left: 3px solid #1D9E75; border-radius: 4px; padding: 10px 14px; margin-bottom: 14px; font-size: 12px; color: #555; line-height: 1.8; }
.how-to strong { color: #0F6E56; font-weight: 600; }
.extra-q { margin-bottom: 14px; }
.gen-btn { display: inline-flex; align-items: center; gap: 6px; background: #0F6E56; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.gen-btn:hover { background: #0a5c47; }
.prompt-output { margin-top: 16px; }
.prompt-label { font-size: 12px; font-weight: 600; color: #0F6E56; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
.prompt-box { background: #f8f8f5; border: 1px solid #ddd; border-radius: 8px; padding: 14px; font-size: 12.5px; color: #1a1a1a; line-height: 1.85; white-space: pre-wrap; word-break: break-word; max-height: 320px; overflow-y: auto; }
.copy-btn { background: #0F6E56; color: #fff; border: none; border-radius: 6px; padding: 5px 14px; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 500; }
.copy-btn:hover { background: #0a5c47; }
.copy-btn.copied { background: #5DCAA5; }
.claude-btn { display: block; width: 100%; margin-top: 10px; background: #fff; border: 2px solid #0F6E56; color: #0F6E56; border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; text-align: center; text-decoration: none; transition: all 0.15s; }
.claude-btn:hover { background: #f0fdf8; }
.nav-row { display: flex; justify-content: space-between; margin-top: 16px; }
.nav-arrow { font-size: 12px; color: #666; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 7px 14px; cursor: pointer; font-family: inherit; }
.nav-arrow:hover { border-color: #1D9E75; color: #0F6E56; }
.complete-msg { font-size: 13px; color: #0F6E56; font-weight: 600; align-self: center; }
@media (max-width: 540px) {
  .fields { grid-template-columns: 1fr; }
  .fields-full { grid-column: 1; }
}
</style>
</head>
<body>

<div class="page-header">
  <div class="page-header-inner">
    <div class="page-logo">大阪府中小企業家同友会 経営労働部｜マーケティング研究会</div>
    <div class="page-title">第14回 AIワークシート｜マーケ活動・計画づくり</div>
    <div class="page-sub">CooKai株式会社 北林弘行 / 2026.3.18</div>
  </div>
</div>

<div class="container">

  <div class="info-banner">
    <strong>使い方：</strong> Step 0に自社情報を入力 → 各ステップで「プロンプトを生成」→ 表示されたプロンプトをコピーして <strong>Claude.ai（claude.ai）に貼り付ける</strong>だけでAI分析が完成します。
  </div>

  <div class="panel" id="companyPanel">
    <div class="panel-header" onclick="toggleCompany()">
      <div style="display:flex;align-items:center;">
        <span class="panel-title">Step 0｜自社情報を入力する</span>
        <span class="panel-tag" id="companyTag">未入力</span>
      </div>
      <span class="toggle-arrow" id="toggleArrow">▼ 開く</span>
    </div>
    <div id="companyFields" style="display:none;">
      <div class="fields">
        <div>
          <div class="field-label">会社名 *</div>
          <input id="companyName" placeholder="株式会社○○" oninput="updateTag()">
        </div>
        <div>
          <div class="field-label">業種・業態</div>
          <input id="industry" placeholder="例：建設業・外壁塗装">
        </div>
        <div>
          <div class="field-label">所在地</div>
          <input id="location" placeholder="例：大阪市中央区">
        </div>
        <div>
          <div class="field-label">従業員数・規模</div>
          <input id="size" placeholder="例：15名・年商3億円">
        </div>
        <div>
          <div class="field-label">WebサイトURL</div>
          <input id="website" placeholder="https://example.com">
        </div>
        <div>
          <div class="field-label">主な顧客層</div>
          <input id="customers" placeholder="例：一般消費者 / 法人BtoB">
        </div>
        <div class="fields-full">
          <div class="field-label">事業内容・主要商品・サービス *</div>
          <textarea id="bizDetail" placeholder="どんな商品・サービスを、誰に、どのように提供していますか？"></textarea>
        </div>
        <div class="fields-full">
          <div class="field-label">現在のマーケティング上の悩み</div>
          <textarea id="challenge" placeholder="例：場当たり的な営業が多い、新規集客の方法がわからない…" style="min-height:55px;"></textarea>
        </div>
      </div>
    </div>
  </div>

  <div class="step-nav" id="stepNav"></div>
  <div id="stepContent"></div>

</div>

<script>
const STEPS = [
  {
    num: 1,
    name: '3Cの整理｜自社・顧客・競合',
    desc: '市場における自社の立ち位置を言語化する',
    how: '生成されたプロンプトをコピーして <strong>claude.ai</strong> に貼り付けると、自社の3C分析が完成します。',
    promptLabel: '特に掘り下げたい点があれば（任意）',
    promptPlaceholder: '例：競合との差別化ポイントを強調してほしい',
    buildPrompt: (c, extra) =>
`あなたは中小企業のマーケティング支援の専門家です。以下の会社情報をもとに、3C分析を日本語で作成してください。

【会社情報】
会社名：${c.name}
業種・業態：${c.industry}
所在地：${c.location}
規模：${c.size}
事業内容：${c.biz}
主な顧客：${c.customers}
現在の課題：${c.challenge}
${extra ? `追加の視点：${extra}` : ''}

【出力してほしい内容】

■ 自社（Company）
・強み（3〜4点）
・弱み・課題（2〜3点）

■ 顧客（Customer）
・主要ターゲット層のプロフィール
・顧客が求めていること（ニーズ・インサイト）

■ 競合（Competitor）
・想定される競合の特徴
・自社が勝てるポイント・差別化余地

最後に「この3Cから見えるマーケティング上の重要課題」を1〜2行でまとめてください。`
  },
  {
    num: 2,
    name: 'マーケ基本戦略｜4P×リソース確認',
    desc: '商品・価格・流通・プロモーションと自社リソースを整理する',
    how: '生成されたプロンプトをコピーして <strong>claude.ai</strong> に貼り付けると、4P戦略とリソース対応表が完成します。',
    promptLabel: '特に強化したい領域（任意）',
    promptPlaceholder: '例：プロモーション強化、新しい販売チャネルの開拓など',
    buildPrompt: (c, extra) =>
`あなたは中小企業のマーケティング実践支援の専門家です。以下の会社情報をもとに、4P戦略の整理と自社リソースの対応表を日本語で作成してください。

【会社情報】
会社名：${c.name}
業種・業態：${c.industry}
所在地：${c.location}
規模：${c.size}
事業内容：${c.biz}
主な顧客：${c.customers}
現在の課題：${c.challenge}
${extra ? `特に強化したい領域：${extra}` : ''}

【出力してほしい内容】

■ Product（商品・サービス）
・現状の強みと改善余地

■ Price（価格戦略）
・推奨する価格ポジションと根拠

■ Place（流通・チャネル）
・現状のチャネルと追加すべきチャネル候補

■ Promotion（プロモーション）
・リソースを考慮した優先施策（3点、実行しやすい順）

■ リソース確認
人・モノ・カネ・情報それぞれに「使えるもの」「不足しているもの」を簡潔に記載`
  },
  {
    num: 3,
    name: 'ビジョン逆算｜中長期マーケ計画',
    desc: '3〜5年後のゴールから今年やるべきことを逆算する',
    how: '生成されたプロンプトをコピーして <strong>claude.ai</strong> に貼り付けると、年間マーケティング計画の骨格が完成します。',
    promptLabel: '3〜5年後に実現したい姿（できれば入力）',
    promptPlaceholder: '例：地域No.1の外壁塗装会社になる、法人顧客を20社確保する',
    buildPrompt: (c, extra) =>
`あなたは中小企業の経営・マーケティング支援の専門家です。以下の会社情報をもとに、マーケティング年間計画の骨格を日本語で作成してください。

【会社情報】
会社名：${c.name}
業種・業態：${c.industry}
所在地：${c.location}
規模：${c.size}
事業内容：${c.biz}
主な顧客：${c.customers}
現在の課題：${c.challenge}
${extra ? `3〜5年後に実現したい姿：${extra}` : ''}

【出力してほしい内容】

■ 中長期目標（3〜5年）
・目標像と主要KPI（売上・顧客数・認知度など）

■ 今年度の重点テーマ（3つ以内）

■ 年間アクションプラン
Q1（1〜3月）・Q2（4〜6月）・Q3（7〜9月）・Q4（10〜12月）
それぞれ主要アクションを2〜3点

■ 最初の90日でやること（即実行ベスト3）
優先順に、理由とともに記載`
  },
  {
    num: 4,
    name: '顧客管理・ファネル設計',
    desc: '認知→購入→リピート→口コミの流れを設計する',
    how: '生成されたプロンプトをコピーして <strong>claude.ai</strong> に貼り付けると、ダブルファネルの設計とKPIが完成します。',
    promptLabel: '特に弱いと感じるフェーズ（任意）',
    promptPlaceholder: '例：認知が少ない、リピートが少ない、口コミが生まれない',
    buildPrompt: (c, extra) =>
`あなたは中小企業のマーケティング支援の専門家です。以下の会社情報をもとに、マーケティングファネルの設計とKPI案を日本語で作成してください。

【会社情報】
会社名：${c.name}
業種・業態：${c.industry}
規模：${c.size}
事業内容：${c.biz}
主な顧客：${c.customers}
現在の課題：${c.challenge}
${extra ? `特に弱いと感じるフェーズ：${extra}` : ''}

【出力してほしい内容】

■ パーチェスファネル（認知〜購入）
各段階（認知→興味・関心→検索・比較→購入）ごとに：
・使うべきメディア
・発信すべき内容・メッセージ
・期待するリアクション
・顧客のインサイト

■ インフルエンスファネル（購入後〜拡散）
各段階（満足→リピート→口コミ・紹介）ごとに具体的な施策

■ 最優先で強化すべきフェーズと理由（1箇所）

■ 設定すべきKPI候補（3〜5個）`
  },
  {
    num: 5,
    name: 'AIプロンプト集｜自社用テンプレ',
    desc: '今後の計画・発信・商談に使えるプロンプトをまとめて作成',
    how: '生成されたプロンプトをコピーして <strong>claude.ai</strong> に貼り付けると、自社専用のAI活用プロンプト集が完成します。',
    promptLabel: '特に自動化・効率化したい業務（任意）',
    promptPlaceholder: '例：SNS投稿、問合せ対応、見積もり補足文、提案資料作成',
    buildPrompt: (c, extra) =>
`あなたは中小企業のAI活用支援の専門家です。以下の会社が日常業務ですぐに使えるAIプロンプトテンプレートを5〜7個、日本語で作成してください。

【会社情報】
会社名：${c.name}
業種・業態：${c.industry}
規模：${c.size}
事業内容：${c.biz}
主な顧客：${c.customers}
現在の課題：${c.challenge}
${extra ? `特に自動化・効率化したい業務：${extra}` : ''}

【出力形式】
各プロンプトを以下の形式で作成してください：

【タイトル】（用途・使用場面）
【プロンプト】
（そのままコピーして使える具体的な文章。会社名や商品名など変数は【　】で囲む）

対象業務の例：
・マーケティング計画の月次振り返り
・SNS・ホームページ用の投稿文作成
・顧客への提案・見積もり補足文
・新規顧客向けセールストーク整理
・${extra || '業務効率化・時短に役立つもの'}`
  }
];

let currentStep = 0;
let generated = {};
let companyOpen = false;

function getCompanyInfo() {
  return {
    name: document.getElementById('companyName').value || '（会社名未入力）',
    industry: document.getElementById('industry').value || '（未入力）',
    location: document.getElementById('location').value || '（未入力）',
    size: document.getElementById('size').value || '（未入力）',
    biz: document.getElementById('bizDetail').value || '（事業内容未入力）',
    customers: document.getElementById('customers').value || '（未入力）',
    challenge: document.getElementById('challenge').value || '（未入力）'
  };
}

function updateTag() {
  const name = document.getElementById('companyName').value;
  const tag = document.getElementById('companyTag');
  tag.textContent = name || '未入力';
  tag.style.background = name ? '#E1F5EE' : '#eee';
  tag.style.color = name ? '#0F6E56' : '#888';
}

function toggleCompany() {
  companyOpen = !companyOpen;
  document.getElementById('companyFields').style.display = companyOpen ? 'grid' : 'none';
  document.getElementById('toggleArrow').textContent = companyOpen ? '▲ 閉じる' : '▼ 開く';
}

function renderStepNav() {
  const nav = document.getElementById('stepNav');
  nav.innerHTML = STEPS.map((s, i) => {
    let cls = 'step-btn';
    if (i === currentStep) cls += ' active';
    else if (generated[i]) cls += ' done';
    return `<button class="${cls}" onclick="goStep(${i})">Step ${s.num}</button>`;
  }).join('');
}

function renderStep() {
  const s = STEPS[currentStep];
  const prompt = generated[currentStep] || '';
  document.getElementById('stepContent').innerHTML = `
    <div class="step-card">
      <div class="step-head">
        <div class="step-num">${s.num}</div>
        <div>
          <div class="step-name">${s.name}</div>
          <div class="step-desc">${s.desc}</div>
        </div>
      </div>
      <div class="step-body">
        <div class="how-to">📋 ${s.how}</div>
        <div class="extra-q">
          <div class="field-label">${s.promptLabel}</div>
          <input id="extraInput" placeholder="${s.promptPlaceholder}" style="margin-top:4px;">
        </div>
        <button class="gen-btn" onclick="generatePrompt()">✦ プロンプトを生成する</button>
        ${prompt ? `
        <div class="prompt-output">
          <div class="prompt-label">
            <span>▼ 生成されたプロンプト（コピーして claude.ai に貼り付け）</span>
            <button class="copy-btn" id="copyBtn" onclick="copyPrompt()">コピー</button>
          </div>
          <div class="prompt-box" id="promptBox">${escHtml(prompt)}</div>
          <a href="https://claude.ai" target="_blank" class="claude-btn">→ Claude.ai を開く</a>
        </div>
        ` : ''}
        <div class="nav-row">
          ${currentStep > 0 ? `<button class="nav-arrow" onclick="goStep(${currentStep - 1})">← 前へ</button>` : '<span></span>'}
          ${currentStep < STEPS.length - 1
            ? `<button class="nav-arrow" onclick="goStep(${currentStep + 1})">次へ →</button>`
            : `<span class="complete-msg">✓ 全ステップ完了！</span>`}
        </div>
      </div>
    </div>`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function generatePrompt() {
  const c = getCompanyInfo();
  const extra = document.getElementById('extraInput')?.value || '';
  generated[currentStep] = STEPS[currentStep].buildPrompt(c, extra);
  renderStepNav();
  renderStep();
}

function copyPrompt() {
  const text = generated[currentStep] || '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    if (btn) {
      btn.textContent = 'コピー済み ✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2500);
    }
  });
}

function goStep(i) {
  currentStep = i;
  renderStepNav();
  renderStep();
}

renderStepNav();
renderStep();
</script>
</body>
</html>
